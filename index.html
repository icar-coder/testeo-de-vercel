<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Productos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔍 Buscador de Productos</h1>
        <p class="subtitle">Encuentra lo que necesitas al mejor precio</p>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Buscar productos por nombre, categoría o descripción..."
                autocomplete="off"
            />
            <button id="searchButton">Buscar</button>
        </div>

        <div class="filters">
            <select id="categoryFilter">
                <option value="">📂 Todas las categorías</option>
                <option value="Computadoras">💻 Computadoras</option>
                <option value="Teléfonos">📱 Teléfonos</option>
                <option value="Audio">🎧 Audio</option>
                <option value="Monitores">🖥️ Monitores</option>
                <option value="Accesorios">⌨️ Accesorios</option>
            </select>
            <select id="sortFilter">
                <option value="relevance">⭐ Relevancia</option>
                <option value="price-asc">💰 Precio: menor a mayor</option>
                <option value="price-desc">💰 Precio: mayor a menor</option>
                <option value="name">🔤 Nombre A-Z</option>
            </select>
        </div>

        <div id="stats"></div>

        <div id="results">
            <div class="loading">Cargando productos</div>
        </div>

        <button id="loadMoreBtn">Cargar más productos</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
